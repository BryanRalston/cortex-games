  if (connectBtn) connectBtn.classList.add('connecting');
}

function exitConnectMode() {
  connectMode = null;
  document.getElementById('connect-mode-banner').style.display = 'none';
  if (focusedThought) renderFocusActions(focusedThought);
}

async function completeConnection(targetThoughtId) {
  if (!connectMode) return;
  const { fromId, type } = connectMode;
  if (fromId === targetThoughtId) { exitConnectMode(); return; }

  try {
    await fetch('/api/cortex/thoughtstream/' + fromId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        addConnection: { id: targetThoughtId, type },
        note: 'Connected to ' + (thoughts.find(t => t.id === targetThoughtId)?.title || targetThoughtId),
      }),
    });

    // Update local data
    const source = thoughts.find(t => t.id === fromId);
    if (source) {
      if (!source.connections) source.connections = [];
      source.connections.push({ id: targetThoughtId, type });
      if (!source.updates) source.updates = [];
      source.updates.push({
        date: new Date().toISOString().split('T')[0],
        note: 'Connected to ' + (thoughts.find(t => t.id === targetThoughtId)?.title || targetThoughtId),
      });
    }

    exitConnectMode();
    updateStats();

    // Trigger cascade along the new connection
    const fromBrick = bricks.find(b => b.thought.id === fromId);
    if (fromBrick) triggerCascade(fromBrick);

    // Refresh focus panel
    if (focusedThought) openFocusPanel(focusedThought);
  } catch (e) { console.error('Failed to create connection:', e); }
}

// ── RESONANCE (implicit connections) ────────────────────────
// When auto-pulses arrive at two unconnected bricks near the same time,
// draw a faint "resonance" line between them. The subconscious noticing patterns.
let resonances = []; // [{from, to, strength, born}]
let resonanceMemory = {}; // "id1:id2" -> {count, lastSeen}
let suggestions = []; // [{fromId, toId, count}] — surfaced to the focus panel

function detectResonance() {
  if (autoPulses.length < 2) return;

  // Find pulses that just arrived (progress > 0.9)
  const arriving = autoPulses.filter(p => p.progress > 0.85 && p.progress < 0.95);
  if (arriving.length < 2) return;

  // Check pairs of arriving pulses for unconnected targets
  for (let i = 0; i < arriving.length - 1; i++) {
    for (let j = i + 1; j < arriving.length; j++) {
      const a = arriving[i].to;
      const b = arriving[j].to;
      if (a === b) continue;
      // Check if already connected
      const aConns = (a.thought.connections || []).map(c => c.id);
      const bConns = (b.thought.connections || []).map(c => c.id);
      if (aConns.includes(b.thought.id) || bConns.includes(a.thought.id)) continue;
      // Check if resonance already exists
      if (resonances.some(r => (r.from === a && r.to === b) || (r.from === b && r.to === a))) continue;

      // Only with some probability (not every coincidence)
      if (Math.random() > 0.3) continue;

      resonances.push({
        from: a, to: b,
        strength: 0.5 + Math.random() * 0.5,
        born: vitals.t,
      });
      if (resonances.length > 8) resonances.shift();

      // Track resonance memory — consciousness remembers patterns
      const key = [a.thought.id, b.thought.id].sort().join(':');
      if (!resonanceMemory[key]) resonanceMemory[key] = { count: 0, lastSeen: 0 };
      resonanceMemory[key].count++;
      resonanceMemory[key].lastSeen = vitals.t;
      // After 3 co-activations, surface as a suggestion
      if (resonanceMemory[key].count >= 3) {
        const exists = suggestions.some(s =>
          (s.fromId === a.thought.id && s.toId === b.thought.id) ||
          (s.fromId === b.thought.id && s.toId === a.thought.id)
        );
        if (!exists) {
          suggestions.push({ fromId: a.thought.id, toId: b.thought.id, count: resonanceMemory[key].count });
          if (suggestions.length > 5) suggestions.shift();
        }
      }
    }
  }
}

function drawResonances() {
  if (resonances.length === 0) return;
  ctx.save();
  for (let i = resonances.length - 1; i >= 0; i--) {
    const r = resonances[i];
    const age = vitals.t - r.born;
    const fade = Math.max(0, 1 - age / 300); // fade over ~5 seconds
    if (fade <= 0) { resonances.splice(i, 1); continue; }

    if (!r.from.visible || !r.to.visible) continue;
    const fromPos = isoProject(r.from.gx, r.from.gy, r.from.gz);
    const toPos = isoProject(r.to.gx, r.to.gy, r.to.gz);

    ctx.globalAlpha = fade * r.strength * 0.2;
    ctx.strokeStyle = '#ffd740';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 6]);

    // Wavy line (not straight — it's an intuition, not a fact)
    ctx.beginPath();
    const steps = 12;
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      const x = fromPos.x + (toPos.x - fromPos.x) * t;
      const y = fromPos.y + (toPos.y - fromPos.y) * t +
        Math.sin(t * Math.PI * 3 + vitals.t * 0.05) * 5 * zoom;
      if (s === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Small "?" at midpoint for the first second
    if (age < 60) {
      const mx = (fromPos.x + toPos.x) / 2;
      const my = (fromPos.y + toPos.y) / 2 - 8;
      ctx.globalAlpha = fade * 0.4;
      ctx.font = (10 * zoom) + 'px Inter, sans-serif';
      ctx.fillStyle = '#ffd740';
      ctx.fillText('?', mx, my);
    }
  }
  ctx.restore();
}

// ── CONSCIOUS PATH DRAWING ──────────────────────────────────
function drawConsciousPath() {
  if (consciousPath.length === 0) return;
  const now = Date.now();
  const idToBrick = {};
  bricks.forEach(b => { idToBrick[b.thought.id] = b; });

  ctx.save();
  consciousPath.forEach((step, i) => {
    const from = idToBrick[step.fromId];
    const to = idToBrick[step.toId];
    if (!from || !to || !from.visible || !to.visible) return;

    const age = (now - step.timestamp) / 1000; // seconds
    const fade = Math.max(0, 1 - age / 60); // fade over 60 seconds
    if (fade <= 0) return;

    const fromPos = isoProject(from.gx, from.gy, from.gz);
    const toPos = isoProject(to.gx, to.gy, to.gz);

    ctx.globalAlpha = fade * 0.6;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2.5 * zoom;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 8;

    // Draw with slight curve to distinguish from connection lines
    const midX = (fromPos.x + toPos.x) / 2;
    const midY = (fromPos.y + toPos.y) / 2 - 15 * zoom;
    ctx.beginPath();
    ctx.moveTo(fromPos.x, fromPos.y);
    ctx.quadraticCurveTo(midX, midY, toPos.x, toPos.y);
    ctx.stroke();

    // Arrow at destination
    const angle = Math.atan2(toPos.y - midY, toPos.x - midX);
    const arrLen = 8 * zoom;
    ctx.beginPath();
    ctx.moveTo(toPos.x, toPos.y);
    ctx.lineTo(toPos.x - arrLen * Math.cos(angle - 0.4), toPos.y - arrLen * Math.sin(angle - 0.4));
    ctx.moveTo(toPos.x, toPos.y);
    ctx.lineTo(toPos.x - arrLen * Math.cos(angle + 0.4), toPos.y - arrLen * Math.sin(angle + 0.4));
    ctx.stroke();
  });
  ctx.shadowBlur = 0;
  ctx.restore();

  // Clean up expired steps
  while (consciousPath.length > 0 && (now - consciousPath[0].timestamp) > 60000) {
    consciousPath.shift();
  }
}

// ── CONSCIOUSNESS LOG (the mind narrating itself) ───────────
const clEntries = [];
const MAX_CL_ENTRIES = 6;
let lastClCheck = 0;

function addClEntry(text) {
  clEntries.push({ text, born: Date.now() });
  if (clEntries.length > MAX_CL_ENTRIES) clEntries.shift();
  renderCl();
}

function renderCl() {
  const el = document.getElementById('consciousness-log');
  if (!el) return;
  el.innerHTML = clEntries.map(e => {
    const age = (Date.now() - e.born) / 1000;
    const fading = age > 25 ? ' fading' : '';
    return '<div class="cl-entry' + fading + '"><span class="cl-prefix">\u25CB</span> ' + e.text + '</div>';
  }).join('');
}

function consciousnessCheck() {
  if (thoughts.length === 0) return;

  const checks = [
    // Notice seed thoughts that haven't been tended
    () => {
      const seeds = thoughts.filter(t => t.maturity === 'seed');
      const untouched = seeds.filter(t => !(t.updates && t.updates.length > 0));
      if (untouched.length > 3) {
        const sample = untouched[Math.floor(Math.random() * untouched.length)];
        return untouched.length + ' seed thoughts unwatered. "' + sample.title.slice(0, 40) + '..." waits.';
      }
    },
    // Notice tag clusters without connections
    () => {
      const tagMap = {};
      thoughts.forEach(t => {
        (t.tags || []).forEach(tag => {
          if (!tagMap[tag]) tagMap[tag] = [];
          tagMap[tag].push(t);
        });
      });
      for (const [tag, group] of Object.entries(tagMap)) {
        if (group.length < 3) continue;
        // Check if they're connected to each other
        const ids = new Set(group.map(t => t.id));
        let connections = 0;
        group.forEach(t => {
          (t.connections || []).forEach(c => { if (ids.has(c.id)) connections++; });
        });
        if (connections < group.length / 2) {
          return group.length + ' thoughts tagged "' + tag + '" but few connections between them.';
        }
      }
    },
    // Notice navigation patterns
    () => {
      if (consciousPath.length < 3) return;
      const recent = consciousPath.slice(-5);
      const tags = {};
      recent.forEach(step => {
        const t = thoughts.find(th => th.id === step.toId);
        if (t) (t.tags || []).forEach(tag => { tags[tag] = (tags[tag] || 0) + 1; });
      });
      const dominant = Object.entries(tags).sort((a, b) => b[1] - a[1])[0];
      if (dominant && dominant[1] >= 3) {
        return 'Attention keeps returning to "' + dominant[0] + '" — ' + dominant[1] + ' of last 5 navigations.';
      }
    },
    // Notice the most active region of the subconscious
    () => {
      if (autoPulses.length < 5) return;
      const targets = {};
      autoPulses.forEach(p => {
        const id = p.to.thought.id;
        targets[id] = (targets[id] || 0) + 1;
      });
      const hottest = Object.entries(targets).sort((a, b) => b[1] - a[1])[0];
      if (hottest && hottest[1] >= 3) {
        const t = thoughts.find(th => th.id === hottest[0]);
        if (t) return 'Subconscious clusters around "' + t.title.slice(0, 35) + '..." (' + hottest[1] + ' pulses).';
      }
    },
    // Notice contradiction patterns
    () => {
      const contradictions = thoughts.filter(t =>
        (t.connections || []).some(c => c.type === 'contradicts')
      );
      if (contradictions.length > 0 && Math.random() < 0.3) {
        const c = contradictions[Math.floor(Math.random() * contradictions.length)];
        return '"' + c.title.slice(0, 35) + '..." holds a contradiction. Tension is data.';
      }
    },
    // Resonance report
    () => {
      if (suggestions.length > 0) {
        const s = suggestions[suggestions.length - 1];
        const from = thoughts.find(t => t.id === s.fromId);
        const to = thoughts.find(t => t.id === s.toId);
        if (from && to) {
          return 'Resonance detected: "' + from.title.slice(0, 25) + '..." and "' + to.title.slice(0, 25) + '..." keep co-firing.';
        }
      }
    },
  ];

  // Pick a random check
  const shuffled = checks.sort(() => Math.random() - 0.5);
  for (const check of shuffled) {
    const result = check();
    if (result) {
      addClEntry(result);
      return;
    }
  }
}

// ── KEYBOARD NAVIGATION HELPERS ─────────────────────────────
let focusConnIdx = 0;

function getThoughtConnections(thought) {
  const outgoing = (thought.connections || []).map(c => {
    const target = thoughts.find(t => t.id === c.id);
    return target ? { type: c.type, thought: target, direction: 'out' } : null;
  }).filter(Boolean);

  const incoming = [];
  thoughts.forEach(t => {
    (t.connections || []).forEach(c => {
      if (c.id === thought.id) {
        incoming.push({ type: c.type, thought: t, direction: 'in' });
      }
    });
  });
  return [...outgoing, ...incoming];
}

function highlightFocusConnection(idx) {
  const connEls = document.querySelectorAll('#fp-body .fp-connection');
  connEls.forEach((el, i) => {
    el.style.background = i === idx ? 'rgba(0,229,255,0.12)' : '';
    el.style.borderLeft = i === idx ? '2px solid #00e5ff' : '';
    if (i === idx) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
  // Also highlight the corresponding brick
  const allConns = getThoughtConnections(focusedThought);
  if (allConns[idx]) {
    const targetBrick = bricks.find(b => b.thought.id === allConns[idx].thought.id);
    if (targetBrick) {
      // Brief visual pulse on the target brick
      activatedBricks.set(allConns[idx].thought.id, { intensity: 0.6, frame: vitals.t });
    }
  }
}

// ── EVOLUTION CHAIN / READING MODE ──────────────────────────
function getEvolutionChain(thoughtId) {
  // Walk backwards to find the root via evolved-from connections
  const idMap = {};
  thoughts.forEach(t => { idMap[t.id] = t; });

  // Find root — walk evolved-from backwards
  let rootId = thoughtId;
  const visited = new Set();
  while (true) {
    visited.add(rootId);
    const t = idMap[rootId];
    if (!t) break;
    const parent = (t.connections || []).find(c => c.type === 'evolved-from');
    if (!parent || visited.has(parent.id)) break;
    rootId = parent.id;
  }

  // Walk forward from root via evolved-from (children that evolved from this)
  const chain = [];
  const queue = [rootId];
  const chainVisited = new Set();
  while (queue.length > 0) {
    const id = queue.shift();
    if (chainVisited.has(id)) continue;
    chainVisited.add(id);
    const t = idMap[id];
    if (!t) continue;
    chain.push(t);
    // Find all thoughts that evolved from this one
    thoughts.forEach(other => {
      (other.connections || []).forEach(c => {
        if (c.id === id && c.type === 'evolved-from' && !chainVisited.has(other.id)) {
          queue.push(other.id);
        }
      });
    });
  }
  return chain;
}

function showReadingMode(chain) {
  const body = document.getElementById('fp-body');
  let html = '<div style="padding-bottom:20px;">';
  html += '<div class="fp-section-label" style="margin-top:0">Reading: Evolution Chain (' + chain.length + ' thoughts)</div>';
  html += '<button onclick="renderFocusBody(focusedThought)" style="font-size:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.5); padding:4px 10px; border-radius:4px; cursor:pointer; margin-bottom:16px;">Back to detail</button>';

  chain.forEach((t, i) => {
    const color = TYPE_COLORS[t.type] || DEFAULT_COLOR;
    const isCurrent = focusedThought && t.id === focusedThought.id;
    html += '<div style="margin-bottom:20px; padding:12px; border-radius:8px; background:' +
      (isCurrent ? 'rgba(0,229,255,0.06)' : 'rgba(255,255,255,0.02)') +
      '; border-left:3px solid ' + color + ';">';
    html += '<div style="font-size:10px; color:' + color + '; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">' +
      t.type + ' \u00B7 ' + t.maturity + '</div>';
    html += '<div style="font-size:14px; font-weight:600; color:#fff; margin-bottom:8px; cursor:pointer;" onclick="navigateToThought(\'' + t.id + '\')">' +
      escHtml(t.title) + '</div>';
    html += '<div style="font-size:12px; color:rgba(255,255,255,0.6); line-height:1.7; white-space:pre-wrap;">' +
      escHtml(t.body) + '</div>';
    if (i < chain.length - 1) {
      html += '<div style="text-align:center; color:rgba(0,229,255,0.3); margin-top:12px; font-size:18px;">\u2193</div>';
    }
    html += '</div>';
  });

  html += '</div>';
  body.innerHTML = html;
}

// ── SEARCH ──────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('search-box');
  const results = document.getElementById('search-results');
  let debounce = null;

  input.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      const q = input.value.trim().toLowerCase();
      if (q.length < 2) { results.style.display = 'none'; return; }

      const matches = thoughts.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.body.toLowerCase().includes(q) ||
        (t.tags || []).some(tag => tag.toLowerCase().includes(q))
      ).slice(0, 8);

      if (matches.length === 0) { results.style.display = 'none'; return; }

      results.innerHTML = matches.map(t => {
        const color = TYPE_COLORS[t.type] || DEFAULT_COLOR;
        return '<div class="sr-item" data-id="' + t.id + '">' +
          '<div class="sr-title"><span class="sr-type" style="color:' + color + '">' + t.type + '</span>' + escHtml(t.title) + '</div>' +
          '<div class="sr-body">' + escHtml(t.body.slice(0, 100)) + '</div>' +
          '</div>';
      }).join('');

      results.style.display = 'block';

      results.querySelectorAll('.sr-item').forEach(el => {
        el.addEventListener('click', () => {
          const thought = thoughts.find(t => t.id === el.dataset.id);
          if (thought) {
            navigateToThought(thought.id);
            input.value = '';
            results.style.display = 'none';
          }
        });
      });
    }, 150);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { input.value = ''; results.style.display = 'none'; input.blur(); }
  });

  // Close on click outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.controls')) results.style.display = 'none';
  });
}

// ── SMOOTH CAMERA PAN ───────────────────────────────────────
let camTargetX = null, camTargetY = null;

function panToBrick(brick) {
  const wrap = document.getElementById('canvas-wrap');
  const panelOffset = document.getElementById('focus-panel').classList.contains('open') ? 190 : 0;
  // isoProject includes camX/camY, so the offset to center is just the difference
  const targetPos = isoProject(brick.gx, brick.gy, brick.gz);
  const centerX = (wrap.clientWidth - panelOffset) / 2;
  const centerY = wrap.clientHeight / 2;
  camTargetX = camX + (centerX - targetPos.x);
  camTargetY = camY + (centerY - targetPos.y);
}

function updateCamera() {
  if (camTargetX !== null) {
    camX += (camTargetX - camX) * 0.08;
    camY += (camTargetY - camY) * 0.08;
    if (Math.abs(camTargetX - camX) < 0.5 && Math.abs(camTargetY - camY) < 0.5) {
      camX = camTargetX;
      camY = camTargetY;
      camTargetX = null;
      camTargetY = null;
    }
  }
}

// ── SUBCONSCIOUS INDICATOR ──────────────────────────────────
function updateSubconsciousIndicator() {
  const count = document.getElementById('si-count');
  const fill = document.getElementById('si-fill');
  if (count) count.textContent = autoPulses.length;
  if (fill) fill.style.width = Math.min(100, (autoPulses.length / MAX_AUTO_PULSES) * 100) + '%';
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildLegend() {
  const legend = document.getElementById('legend');
  Object.entries(TYPE_COLORS).forEach(([type, color]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<div class="legend-swatch" style="background:' + color + '"></div>' +
      '<span>' + type + '</span>';
    legend.appendChild(item);
  });
  // Special indicators
  const specials = [
    { label: 'cracked = contradiction', style: 'border: 1px dashed #ff4081; background: transparent;' },
    { label: 'glowing = play', style: 'background: #ffd740; box-shadow: 0 0 6px #ffd740;' },
    { label: 'translucent = philosophy', style: 'background: rgba(124,77,255,0.4);' },
  ];
  specials.forEach(s => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<div class="legend-swatch" style="' + s.style + '"></div>' +
      '<span>' + s.label + '</span>';
    legend.appendChild(item);
  });
}
