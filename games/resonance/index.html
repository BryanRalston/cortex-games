<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Resonance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #050508;
    font-family: 'Inter', -apple-system, sans-serif;
    cursor: crosshair;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
  }
  #hint {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    letter-spacing: 0.04em;
    pointer-events: none;
    transition: opacity 1.5s;
  }
  #hint.faded { opacity: 0; }
  #node-count {
    position: fixed;
    top: 16px;
    right: 20px;
    color: rgba(255,255,255,0.12);
    font-size: 12px;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">place nodes. move them. listen to the space between.</div>
<div id="node-count"></div>
<script>
(function() {
  'use strict';

  // ── Canvas ──
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Audio ──
  let audioCtx = null;
  let masterGain = null;
  let reverbGain = null;
  let dryGain = null;
  let compressor = null;

  // Pentatonic scale across 3 octaves: C3-A5
  const BASE_NOTES = [
    130.81, 146.83, 164.81, 196.00, 220.00,  // C3 D3 E3 G3 A3
    261.63, 293.66, 329.63, 392.00, 440.00,  // C4 D4 E4 G4 A4
    523.25, 587.33, 659.25, 783.99, 880.00   // C5 D5 E5 G5 A5
  ];

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -20;
    compressor.knee.value = 10;
    compressor.ratio.value = 4;

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.6;

    // Simple reverb via delay feedback
    dryGain = audioCtx.createGain();
    dryGain.gain.value = 0.7;

    reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.3;

    const delay1 = audioCtx.createDelay(1.0);
    delay1.delayTime.value = 0.15;
    const delay2 = audioCtx.createDelay(1.0);
    delay2.delayTime.value = 0.23;
    const fb1 = audioCtx.createGain();
    fb1.gain.value = 0.35;
    const fb2 = audioCtx.createGain();
    fb2.gain.value = 0.25;
    const reverbFilter = audioCtx.createBiquadFilter();
    reverbFilter.type = 'lowpass';
    reverbFilter.frequency.value = 2500;

    // Routing: source -> compressor -> dry + reverb -> master -> output
    compressor.connect(dryGain);
    dryGain.connect(masterGain);

    compressor.connect(delay1);
    delay1.connect(fb1);
    fb1.connect(delay1);
    delay1.connect(reverbFilter);

    compressor.connect(delay2);
    delay2.connect(fb2);
    fb2.connect(delay2);
    delay2.connect(reverbFilter);

    reverbFilter.connect(reverbGain);
    reverbGain.connect(masterGain);

    masterGain.connect(audioCtx.destination);

    // Subtle low drone
    const drone = audioCtx.createOscillator();
    drone.type = 'sine';
    drone.frequency.value = 65.41; // C2
    const droneGain = audioCtx.createGain();
    droneGain.gain.value = 0.015;
    const droneFilter = audioCtx.createBiquadFilter();
    droneFilter.type = 'lowpass';
    droneFilter.frequency.value = 200;
    drone.connect(droneFilter);
    droneFilter.connect(droneGain);
    droneGain.connect(masterGain);
    drone.start();
  }

  // ── State ──
  const nodes = [];
  const connections = new Map(); // key: 'id1-id2' -> connection object
  let nextId = 0;
  let dragNode = null;
  let dragOffset = { x: 0, y: 0 };
  let hintFaded = false;

  const MAX_DIST = 250;
  const WAVEFORMS = ['sine', 'triangle', 'sine', 'square'];

  function makeNode(x, y) {
    return {
      id: nextId++,
      x: x,
      y: y,
      r: 6,
      phase: Math.random() * Math.PI * 2,
      connCount: 0
    };
  }

  function connKey(a, b) {
    const lo = Math.min(a.id, b.id);
    const hi = Math.max(a.id, b.id);
    return lo + '-' + hi;
  }

  function distToNote(dist) {
    // Map distance 0-MAX_DIST to note index (high to low)
    const t = dist / MAX_DIST;
    const idx = Math.floor(t * (BASE_NOTES.length - 1));
    return BASE_NOTES[Math.min(BASE_NOTES.length - 1, Math.max(0, BASE_NOTES.length - 1 - idx))];
  }

  function distToVolume(dist) {
    if (dist >= MAX_DIST) return 0;
    const t = dist / MAX_DIST;
    return Math.pow(1 - t, 1.5) * 0.18;
  }

  function createConnection(a, b) {
    const key = connKey(a, b);
    if (connections.has(key)) return;

    initAudio();

    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    const freq = distToNote(dist);
    const vol = distToVolume(dist);
    const waveIdx = (a.id + b.id) % WAVEFORMS.length;

    const osc = audioCtx.createOscillator();
    osc.type = WAVEFORMS[waveIdx];
    osc.frequency.value = freq;

    // Second detuned oscillator for richness
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 1.002;

    const gain = audioCtx.createGain();
    gain.gain.value = 0; // start silent, fade in

    const gain2 = audioCtx.createGain();
    gain2.gain.value = 0;

    osc.connect(gain);
    osc2.connect(gain2);
    gain.connect(compressor);
    gain2.connect(compressor);

    osc.start();
    osc2.start();

    // Fade in
    const now = audioCtx.currentTime;
    gain.gain.setTargetAtTime(vol, now, 0.08);
    gain2.gain.setTargetAtTime(vol * 0.3, now, 0.08);

    const conn = {
      key: key,
      a: a,
      b: b,
      osc: osc,
      osc2: osc2,
      gain: gain,
      gain2: gain2,
      volume: vol,
      freq: freq,
      birth: Date.now(),
      dying: false,
      opacity: 0
    };

    connections.set(key, conn);
    a.connCount++;
    b.connCount++;
  }

  function updateConnection(conn) {
    const dist = Math.hypot(conn.a.x - conn.b.x, conn.a.y - conn.b.y);

    if (dist >= MAX_DIST) {
      destroyConnection(conn);
      return;
    }

    const freq = distToNote(dist);
    const vol = distToVolume(dist);
    const now = audioCtx.currentTime;

    conn.osc.frequency.setTargetAtTime(freq, now, 0.05);
    conn.osc2.frequency.setTargetAtTime(freq * 1.002, now, 0.05);
    conn.gain.gain.setTargetAtTime(vol, now, 0.05);
    conn.gain2.gain.setTargetAtTime(vol * 0.3, now, 0.05);
    conn.volume = vol;
    conn.freq = freq;
  }

  function destroyConnection(conn) {
    if (conn.dying) return;
    conn.dying = true;
    conn.a.connCount = Math.max(0, conn.a.connCount - 1);
    conn.b.connCount = Math.max(0, conn.b.connCount - 1);

    if (audioCtx) {
      const now = audioCtx.currentTime;
      conn.gain.gain.setTargetAtTime(0, now, 0.15);
      conn.gain2.gain.setTargetAtTime(0, now, 0.15);
      setTimeout(function() {
        try { conn.osc.stop(); } catch(e) {}
        try { conn.osc2.stop(); } catch(e) {}
        try { conn.gain.disconnect(); } catch(e) {}
        try { conn.gain2.disconnect(); } catch(e) {}
        connections.delete(conn.key);
      }, 600);
    } else {
      connections.delete(conn.key);
    }
  }

  function removeNode(node) {
    // Destroy all connections for this node
    connections.forEach(function(conn) {
      if (conn.a === node || conn.b === node) {
        destroyConnection(conn);
      }
    });
    const idx = nodes.indexOf(node);
    if (idx !== -1) nodes.splice(idx, 1);
  }

  // ── Interaction ──
  function getPos(e) {
    if (e.touches && e.touches.length > 0) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function findNode(x, y) {
    for (let i = nodes.length - 1; i >= 0; i--) {
      const n = nodes[i];
      if (Math.hypot(n.x - x, n.y - y) < 20) return n;
    }
    return null;
  }

  function onDown(e) {
    e.preventDefault();
    const pos = getPos(e);
    const hit = findNode(pos.x, pos.y);

    if (hit) {
      dragNode = hit;
      dragOffset.x = hit.x - pos.x;
      dragOffset.y = hit.y - pos.y;
    }
  }

  function onMove(e) {
    e.preventDefault();
    if (!dragNode) return;
    const pos = getPos(e);
    dragNode.x = pos.x + dragOffset.x;
    dragNode.y = pos.y + dragOffset.y;

    // Update all connections involving this node
    connections.forEach(function(conn) {
      if (conn.a === dragNode || conn.b === dragNode) {
        updateConnection(conn);
      }
    });
  }

  function onUp(e) {
    if (!dragNode) {
      // Place new node
      const pos = getPos(e.changedTouches ? e : e);
      let x, y;
      if (e.changedTouches && e.changedTouches.length > 0) {
        x = e.changedTouches[0].clientX;
        y = e.changedTouches[0].clientY;
      } else {
        x = e.clientX;
        y = e.clientY;
      }

      if (x === undefined) { dragNode = null; return; }

      const existing = findNode(x, y);
      if (!existing) {
        initAudio();
        const node = makeNode(x, y);
        nodes.push(node);

        // Check for connections with all existing nodes
        for (let i = 0; i < nodes.length; i++) {
          if (nodes[i] === node) continue;
          const dist = Math.hypot(node.x - nodes[i].x, node.y - nodes[i].y);
          if (dist < MAX_DIST) {
            createConnection(node, nodes[i]);
          }
        }

        if (!hintFaded) {
          hintFaded = true;
          document.getElementById('hint').classList.add('faded');
        }
      }
    }
    dragNode = null;
  }

  function onContext(e) {
    e.preventDefault();
    const hit = findNode(e.clientX, e.clientY);
    if (hit) removeNode(hit);
  }

  function onDblClick(e) {
    e.preventDefault();
    // Clear all
    while (nodes.length > 0) removeNode(nodes[0]);
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('contextmenu', onContext);
  canvas.addEventListener('dblclick', onDblClick);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp, { passive: false });

  // ── Check for new connections each frame ──
  function checkConnections() {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
        const key = connKey(nodes[i], nodes[j]);
        const existing = connections.get(key);
        if (dist < MAX_DIST && !existing) {
          createConnection(nodes[i], nodes[j]);
        }
      }
    }
  }

  // ── Render ──
  const time = { now: 0, dt: 0, last: 0 };

  function draw(ts) {
    requestAnimationFrame(draw);

    time.now = ts / 1000;
    time.dt = Math.min(time.now - time.last, 0.05);
    time.last = time.now;

    const w = window.innerWidth;
    const h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);

    checkConnections();

    // Draw connections
    connections.forEach(function(conn) {
      if (conn.dying) {
        conn.opacity = Math.max(0, conn.opacity - time.dt * 3);
      } else {
        conn.opacity = Math.min(1, conn.opacity + time.dt * 5);
      }
      if (conn.opacity <= 0) return;

      const dist = Math.hypot(conn.a.x - conn.b.x, conn.a.y - conn.b.y);
      const intensity = Math.max(0, 1 - dist / MAX_DIST);
      const alpha = intensity * 0.6 * conn.opacity;

      // Line glow
      const hue = 190 + (conn.freq / 880) * 40; // cyan to blue-purple
      ctx.beginPath();
      ctx.moveTo(conn.a.x, conn.a.y);
      ctx.lineTo(conn.b.x, conn.b.y);
      ctx.strokeStyle = 'hsla(' + hue + ', 80%, 65%, ' + alpha + ')';
      ctx.lineWidth = 1.5 + intensity * 2;
      ctx.stroke();

      // Broader glow layer
      ctx.beginPath();
      ctx.moveTo(conn.a.x, conn.a.y);
      ctx.lineTo(conn.b.x, conn.b.y);
      ctx.strokeStyle = 'hsla(' + hue + ', 80%, 65%, ' + (alpha * 0.25) + ')';
      ctx.lineWidth = 6 + intensity * 8;
      ctx.stroke();

      // Traveling particle along the connection
      if (!conn.dying) {
        const speed = 0.3 + intensity * 0.7;
        const t = (time.now * speed) % 1;
        const px = conn.a.x + (conn.b.x - conn.a.x) * t;
        const py = conn.a.y + (conn.b.y - conn.a.y) * t;
        ctx.beginPath();
        ctx.arc(px, py, 2 + intensity * 2, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(' + hue + ', 90%, 75%, ' + (alpha * 0.8) + ')';
        ctx.fill();
      }
    });

    // Draw nodes
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const connected = n.connCount > 0;
      const pulse = Math.sin(time.now * 2 + n.phase) * 0.3 + 0.7;
      const baseAlpha = connected ? 0.9 : 0.3;
      const alpha = baseAlpha * pulse;
      const baseR = connected ? 7 : 5;
      const r = baseR + (connected ? Math.sin(time.now * 3 + n.phase) * 1.5 : 0);

      // Outer glow for connected nodes
      if (connected) {
        const glowR = r + 10 + n.connCount * 3;
        const grad = ctx.createRadialGradient(n.x, n.y, r, n.x, n.y, glowR);
        grad.addColorStop(0, 'rgba(34, 211, 238, ' + (0.12 * pulse) + ')');
        grad.addColorStop(1, 'rgba(34, 211, 238, 0)');
        ctx.beginPath();
        ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      // Node circle
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      if (connected) {
        ctx.fillStyle = 'rgba(34, 211, 238, ' + alpha + ')';
      } else {
        ctx.fillStyle = 'rgba(255, 255, 255, ' + alpha + ')';
      }
      ctx.fill();

      // Inner highlight
      ctx.beginPath();
      ctx.arc(n.x, n.y, r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, ' + (alpha * 0.5) + ')';
      ctx.fill();
    }

    // Node count
    document.getElementById('node-count').textContent =
      nodes.length > 0 ? nodes.length + ' node' + (nodes.length !== 1 ? 's' : '') + ' · ' +
      countActiveConnections() + ' connection' + (countActiveConnections() !== 1 ? 's' : '') : '';
  }

  function countActiveConnections() {
    let count = 0;
    connections.forEach(function(c) { if (!c.dying) count++; });
    return count;
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
